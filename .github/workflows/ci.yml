# CI: lint + build check on every PR + push to main.
# Cloudflare Pages handles actual deployment separately via its GitHub
# integration (push to main → auto-deploy production; PR → preview URL).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check + build
        run: npm run build
